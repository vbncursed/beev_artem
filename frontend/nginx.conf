# Cadence SPA — same-origin layout
#
# The frontend container serves the Vite-built static bundle and forwards
# every /api request to the `gateway` service over the compose network.
# Same-origin means the SPA never needs CORS at runtime; gateway's CORS
# allowlist still kicks in for any browser that talks directly to it
# (e.g. local Vite dev on :5173).

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache for fingerprinted Vite assets. The build emits
    # `assets/index-<hash>.{js,css}` so the URL itself changes on every
    # deploy — safe to mark immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location = /favicon.svg {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Proxy API calls to the gateway service. Path stays intact (gateway
    # also serves under /api/v1/...). proxy_pass without trailing slash
    # preserves the request URI exactly.
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;

        # Resume downloads can be a few MB; raise the default 1 MB body
        # limit so our PDF/DOCX uploads through CreateCandidateFromResume
        # (base64 in JSON) aren't rejected at the proxy.
        client_max_body_size 16m;
        proxy_buffering      off;
        proxy_read_timeout   60s;
    }

    # Tiny same-origin healthcheck so the orchestrator can probe nginx
    # itself without bouncing off the gateway.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — every unknown path serves index.html so React Router
    # picks up client-side routes like /vacancies/:id on a hard reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
