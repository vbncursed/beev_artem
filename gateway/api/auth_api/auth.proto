syntax = "proto3";

package auth.service.v1;

option go_package = "github.com/artem13815/hr/gateway/internal/pb/auth_api";

import "google/api/annotations.proto";
import "models/auth_model.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service AuthService {
  rpc Register(auth.models.v1.RegisterRequest) returns (auth.models.v1.AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register"
      body: "*"
    };
  }

  rpc Login(auth.models.v1.LoginRequest) returns (auth.models.v1.AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }

  rpc Refresh(auth.models.v1.RefreshRequest) returns (auth.models.v1.AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/refresh"
      body: "*"
    };
  }

  rpc Logout(auth.models.v1.LogoutRequest) returns (auth.models.v1.LogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/logout"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc LogoutAll(auth.models.v1.LogoutAllRequest) returns (auth.models.v1.LogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/logout-all"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc Me(auth.models.v1.MeRequest) returns (auth.models.v1.MeResponse) {
    option (google.api.http) = {
      get: "/api/v1/auth/me"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  // Internal RPC for gateway middleware.
  rpc ValidateAccessToken(auth.models.v1.ValidateAccessTokenRequest) returns (auth.models.v1.ValidateAccessTokenResponse) {}
}

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Gateway Auth API";
    version: "1.0.0";
    description: "HTTP gateway for auth-service";
  };
  security_definitions: {
    security: {
      key: "BearerAuth";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
        description: "JWT Bearer token. Format: Bearer <token>";
      }
    }
  }
};
