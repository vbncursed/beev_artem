syntax = "proto3";

package vacancy.service.v1;

option go_package = "github.com/artem13815/hr/gateway/internal/pb/vacancy_api";

import "google/api/annotations.proto";
import "models/vacancy_model.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service VacancyService {
  rpc CreateVacancy(vacancy.models.v1.CreateVacancyRequest) returns (vacancy.models.v1.VacancyResponse) {
    option (google.api.http) = {
      post: "/api/v1/vacancies"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc GetVacancy(vacancy.models.v1.GetVacancyRequest) returns (vacancy.models.v1.VacancyResponse) {
    option (google.api.http) = {
      get: "/api/v1/vacancies/{vacancy_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc ListVacancies(vacancy.models.v1.ListVacanciesRequest) returns (vacancy.models.v1.ListVacanciesResponse) {
    option (google.api.http) = {
      get: "/api/v1/vacancies"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc UpdateVacancy(vacancy.models.v1.UpdateVacancyRequest) returns (vacancy.models.v1.VacancyResponse) {
    option (google.api.http) = {
      patch: "/api/v1/vacancies/{vacancy_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc ArchiveVacancy(vacancy.models.v1.ArchiveVacancyRequest) returns (vacancy.models.v1.ArchiveVacancyResponse) {
    option (google.api.http) = {
      post: "/api/v1/vacancies/{vacancy_id}/archive"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
}

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Vacancy Service API";
    version: "1.0.0";
    description: "Vacancy management service";
  };
  security_definitions: {
    security: {
      key: "BearerAuth";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
        description: "JWT Bearer token. Format: Bearer <token>";
      }
    }
  }
};
