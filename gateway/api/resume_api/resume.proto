syntax = "proto3";

package resume.service.v1;

option go_package = "github.com/artem13815/hr/gateway/internal/pb/resume_api";

import "google/api/annotations.proto";
import "models/resume_model.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service ResumeService {
  rpc CreateCandidate(resume.models.v1.CreateCandidateRequest) returns (resume.models.v1.CandidateResponse) {
    option (google.api.http) = {
      post: "/api/v1/vacancies/{vacancy_id}/candidates"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc GetCandidate(resume.models.v1.GetCandidateRequest) returns (resume.models.v1.CandidateResponse) {
    option (google.api.http) = {
      get: "/api/v1/candidates/{candidate_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc CreateCandidateFromResume(resume.models.v1.CreateCandidateFromResumeRequest) returns (resume.models.v1.CandidateResumeResponse) {
    option (google.api.http) = {
      post: "/api/v1/vacancies/{vacancy_id}/candidates/from-resume"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc IngestResume(resume.models.v1.CreateCandidateFromResumeRequest) returns (resume.models.v1.CandidateResumeResponse) {
    option (google.api.http) = {
      post: "/api/v1/resumes/intake"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc IngestResumeBatch(resume.models.v1.BatchIngestResumeRequest) returns (resume.models.v1.BatchIngestResumeResponse) {
    option (google.api.http) = {
      post: "/api/v1/vacancies/{vacancy_id}/resumes/batch"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc UploadResume(stream resume.models.v1.UploadResumeRequest) returns (resume.models.v1.UploadResumeResponse) {
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc GetResume(resume.models.v1.GetResumeRequest) returns (resume.models.v1.ResumeResponse) {
    option (google.api.http) = {
      get: "/api/v1/resumes/{resume_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc DownloadResume(resume.models.v1.DownloadResumeRequest) returns (resume.models.v1.DownloadResumeResponse) {
    option (google.api.http) = {
      get: "/api/v1/resumes/{resume_id}/download"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc DeleteCandidate(resume.models.v1.DeleteCandidateRequest) returns (resume.models.v1.DeleteCandidateResponse) {
    option (google.api.http) = {
      delete: "/api/v1/candidates/{candidate_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
}

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Resume Service API";
    version: "1.0.0";
    description: "Candidate and resume management service";
  };
  security_definitions: {
    security: {
      key: "BearerAuth";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
        description: "JWT Bearer token. Format: Bearer <token>";
      }
    }
  }
};
