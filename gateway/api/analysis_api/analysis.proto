syntax = "proto3";

package analysis.service.v1;

option go_package = "github.com/artem13815/hr/gateway/internal/pb/analysis_api";

import "google/api/annotations.proto";
import "models/analysis_model.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service AnalysisService {
  rpc StartAnalysis(analysis.models.v1.StartAnalysisRequest) returns (analysis.models.v1.StartAnalysisResponse) {
    option (google.api.http) = {
      post: "/api/v1/resumes/{resume_id}/analyze"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc GetAnalysis(analysis.models.v1.GetAnalysisRequest) returns (analysis.models.v1.AnalysisResponse) {
    option (google.api.http) = {
      get: "/api/v1/analyses/{analysis_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  rpc ListCandidatesByVacancy(analysis.models.v1.ListCandidatesByVacancyRequest) returns (analysis.models.v1.ListCandidatesByVacancyResponse) {
    option (google.api.http) = {
      get: "/api/v1/vacancies/{vacancy_id}/candidates"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
}

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Analysis Service API";
    version: "1.0.0";
    description: "Resume analysis and candidate scoring service";
  };
  security_definitions: {
    security: {
      key: "BearerAuth";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
        description: "JWT Bearer token. Format: Bearer <token>";
      }
    }
  }
};
